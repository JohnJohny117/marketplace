paths:
  /category/{sessionId}:
    get:
      summary: Получить список всех активных категорий
      tags: [Categories]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
          description: Идентификатор сессии (UUID)
      responses:
        200:
          description: Успешный запрос. Возвращает массив категорий.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetCategory'
        401:
          description: Сессия не найдена или неактивна
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'