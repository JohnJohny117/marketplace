paths:
  /order/assign/{sessionId}/{orderId}/{executorId}:
    post:
      summary: Выбрать исполнителя
      description: Назначает исполнителя для заказа, находящегося в статусе `created`. Требуется активная сессия.
      tags: [Orders]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
          description: Идентификатор сессии (UUID)
        - in: path
          name: orderId
          required: true
          schema:
            type: integer
          description: ID заказа
        - in: path
          name: executorId
          required: true
          schema:
            type: integer
          description: ID исполнителя (пользователя)
      responses:
        200:
          description: Исполнитель успешно выбран
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Исполнитель выбран"
        400:
          description: Неверный статус заказа (ожидался "created")
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        401:
          description: Сессия неактивна или не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Недостаточно прав для выполнения действия 
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Заказ не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'