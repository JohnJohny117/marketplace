paths:
  /order/myOrders/{sessionId}:
    get:
      summary: Получить заказы текущего пользователя
      description: |
        Возвращает заказы, где пользователь выступает заказчиком (если роль customer) 
        или исполнителем (если роль executor). Требуется активная сессия.
      tags: [Orders]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            type: string
            format: uuid
          description: Идентификатор сессии (UUID)
      responses:
        200:
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyOrderItem'
        401:
          description: Сессия неактивна или не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        403:
          description: Недостаточно прав для выполнения действия
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        404:
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        500:
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'